<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon & touch icon -->
    <link rel="icon" type="image/png" href="/aurora-favicom.png" />
    <link rel="apple-touch-icon" href="/aurora-logo.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA: barra de navegación del color de la app -->
    <meta name="theme-color" content="#0d1a26" />

    <!-- PWA: comportamiento instalable en iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aurora" />

    <title>Aurora</title>

    <!-- Apply persisted theme before paint to avoid flash-of-wrong-theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('aurora_theme');
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
