<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Panel de Administración de Cultivos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestor de Paquetes Técnicos para Cultivos</h1>
            <p>Crea y administra las "recetas" para tus cultivos de piña.</p>
        </header>

        <main>
            <section id="existing-packages-section" class="card-list">
                <h2>Paquetes Existentes</h2>
                <div id="packages-list-container"><p>Cargando paquetes...</p></div>
            </section>

            <form id="package-form" class="form-card">
                <h2 id="form-title">Nuevo Paquete Técnico</h2>
                
                <!-- NUEVO: Campo oculto para guardar el ID en modo edición -->
                <input type="hidden" id="edit-package-id" name="editPackageId">

                <div class="form-group">
                    <label for="package-name">Nombre del Paquete</label>
                    <input type="text" id="package-name" name="packageName" required>
                </div>

                <div class="form-group">
                    <label for="harvest-type">Tipo de Cosecha</label>
                    <select id="harvest-type" name="harvestType" required>
                        <option value="" disabled selected>Selecciona un tipo</option>
                        <option value="I">Cosecha I</option>
                        <option value="II">Cosecha II</option>
                        <option value="III">Cosecha III</option>
                        <option value="Semillero">Semillero</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="crop-stage">Etapa del Cultivo</label>
                    <input type="text" id="crop-stage" name="cropStage" required>
                </div>

                <fieldset>
                    <legend>Cronograma de Actividades</legend>
                    <div id="activities-container"></div>
                    <button type="button" id="add-activity-btn" class="btn btn-secondary">Añadir Actividad</button>
                </fieldset>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar Paquete Técnico</button>
                    <!-- NUEVO: Botón para cancelar la edición -->
                    <button type="button" id="cancel-edit-btn" class="btn btn-secondary" style="display: none;">Cancelar Edición</button>
                </div>
            </form>
        </main>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
